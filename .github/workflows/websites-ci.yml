name: Websites CI

on:
  push:
    branches: [main]
    paths:
      - 'websites/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/validate_links.js'
  pull_request:
    branches: [main]
    paths:
      - 'websites/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/validate_links.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Run lint on all packages
        run: npm run lint

      - name: Build UI Package
        run: npm run build --workspace=@codrag/ui

      - name: Build Websites
        # Use npx turbo directly to filter for website apps
        run: npx turbo run build --filter="./websites/apps/*"

      - name: Validate Internal Links
        run: node scripts/validate_links.js

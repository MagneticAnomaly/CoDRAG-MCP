name: Bug report
description: Report a reproducible problem with CoDRAG
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        - Questions and how-to: https://github.com/EricBintner/CoDRAG/discussions
        - Troubleshooting: https://docs.codrag.io/troubleshooting
        - Private support: support@codrag.io

  - type: input
    id: version
    attributes:
      label: CoDRAG version
      description: Output of `codrag --version`
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 14.3, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: arch
    attributes:
      label: Architecture
      placeholder: "e.g. arm64, x86_64"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - pip (PyPI)
        - uv
        - from source
        - other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (redact secrets)
      description: Paste relevant logs, errors, and stack traces.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Editor/MCP client, project size, config, screenshots, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I redacted secrets from any logs.
          required: true

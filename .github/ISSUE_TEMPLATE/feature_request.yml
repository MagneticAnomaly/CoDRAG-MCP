name: Feature request
description: Suggest an improvement to CoDRAG
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.

        If you’re not sure whether this is a bug or a feature request, start a thread in Discussions:
        https://github.com/EricBintner/CoDRAG/discussions

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what’s blocking you?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other solutions or workarounds you’ve tried.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, prior art, etc.
